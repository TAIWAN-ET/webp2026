<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景點觀光展覽資訊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-green: #0fa968;
            --page-bg: #f3f5f7;
        }

        body {
            background: radial-gradient(circle at top right, #ffffff 0%, var(--page-bg) 45%, #e9edf2 100%);
            min-height: 100vh;
        }

        .title-block {
            border-left: 6px solid var(--brand-green);
            padding-left: 14px;
        }

        .table thead th {
            background-color: var(--brand-green);
            color: #fff;
            border-color: #0b8a55;
            white-space: nowrap;
        }

        .table td {
            vertical-align: middle;
        }

        .card {
            border: none;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(10, 45, 30, 0.08);
        }

        .table-wrap {
            max-height: 62vh;
            overflow: auto;
        }
    </style>
</head>
<body>
    <main class="container py-4 py-md-5">
        <div class="d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center mb-4">
            <h1 class="title-block m-0 fw-bold">景點觀光展覽資訊</h1>
            <input id="keywordInput" type="text" class="form-control w-100 w-md-auto" style="max-width: 280px;" placeholder="輸入關鍵字搜尋名稱或地點">
        </div>

        <div class="card">
            <div class="table-wrap">
                <table id="csie" class="table table-striped table-hover mb-0">
                    <thead>
                        <tr>
                            <th style="width: 48%;">名稱</th>
                            <th style="width: 28%;">地點</th>
                            <th style="width: 14%;">票價</th>
                            <th style="width: 10%;">時間</th>
                        </tr>
                    </thead>
                    <tbody id="csieBody"></tbody>
                </table>
            </div>

            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 p-3 bg-light border-top">
                <div>
                    <button id="prevBtn" class="btn btn-outline-secondary btn-sm">上一頁</button>
                    <button id="nextBtn" class="btn btn-outline-secondary btn-sm">下一頁</button>
                </div>
                <div class="small text-secondary">
                    <span id="pageInfo">1 / 1 頁</span>
                    <span class="mx-1">|</span>
                    <span id="totalInfo">共 0 筆</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
